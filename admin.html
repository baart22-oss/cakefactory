<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel — CakeFactory</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    #adminApp { display: none; }
    .admin-layout { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }
    .proof-btn { background: none; border: 1px solid var(--border); border-radius: 4px; padding: 0.2rem 0.5rem; cursor: pointer; font-size: 0.8rem; color: var(--primary); }
    .proof-btn:hover { background: rgba(233,30,140,0.08); }
    @media(max-width:900px) { .admin-layout { grid-template-columns: 1fr; } .admin-sidebar { height: auto; } }
  </style>
</head>
<body>

<!-- Admin Login Screen -->
<div id="adminLogin" style="min-height:100vh;background:linear-gradient(135deg,var(--dark),#6b2d0a);display:flex;align-items:center;justify-content:center;padding:1rem;">
  <div style="background:#fff;border-radius:var(--radius);box-shadow:0 20px 60px rgba(0,0,0,0.3);width:100%;max-width:400px;overflow:hidden;">
    <div style="background:var(--dark);padding:2rem;text-align:center;">
      <div style="font-size:2.5rem;margin-bottom:0.5rem;">🎂</div>
      <h2 style="color:#fff;margin:0;">Admin Panel</h2>
      <p style="color:rgba(255,255,255,0.65);font-size:0.85rem;margin-top:0.25rem;">CakeFactory Management</p>
    </div>
    <div style="padding:2rem;">
      <div id="loginError" class="alert alert-danger hidden"></div>
      <form id="adminLoginForm" onsubmit="adminLogin(event)">
        <div class="form-group">
          <label class="form-label">Admin Username</label>
          <input type="text" class="form-control" id="adminUser" placeholder="Username" required />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-icon-wrapper">
            <input type="password" class="form-control" id="adminPass" placeholder="Password" required />
            <span class="input-icon" onclick="togglePassword('adminPass', this)">👁️</span>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="adminLoginBtn">Login</button>
      </form>
    </div>
  </div>
</div>

<!-- Admin Dashboard -->
<div id="adminApp">
  <div class="admin-layout">
    <!-- Sidebar -->
    <div class="admin-sidebar">
      <div class="brand">🎂 Cake<span>Factory</span></div>
      <div style="font-size:0.75rem;color:rgba(255,255,255,0.5);margin-bottom:1.5rem;text-transform:uppercase;letter-spacing:0.08em;">Management</div>

      <button class="admin-nav-item active" onclick="showTab('stats', this)">📊 Dashboard</button>
      <button class="admin-nav-item" onclick="showTab('deposits', this)">💳 Pending Deposits</button>
      <button class="admin-nav-item" onclick="showTab('withdrawals', this)">💸 Pending Withdrawals</button>
      <button class="admin-nav-item" onclick="showTab('transactions', this)">📋 All Transactions</button>
      <button class="admin-nav-item" onclick="showTab('users', this)">👥 All Users</button>

      <div style="position:absolute;bottom:1.5rem;left:1.5rem;right:1.5rem;">
        <button class="btn btn-danger btn-block btn-sm" onclick="adminLogout()">Logout</button>
      </div>
    </div>

    <!-- Main Content -->
    <div class="admin-main">

      <!-- Stats Tab -->
      <div class="tab-pane active" id="tab-stats">
        <h2 style="margin-bottom:1.5rem;">📊 Dashboard Overview</h2>
        <div class="grid-4" id="statsGrid">
          <div class="stat-card shimmer" style="height:120px;"></div>
          <div class="stat-card shimmer" style="height:120px;"></div>
          <div class="stat-card shimmer" style="height:120px;"></div>
          <div class="stat-card shimmer" style="height:120px;"></div>
        </div>
      </div>

      <!-- Pending Deposits Tab -->
      <div class="tab-pane" id="tab-deposits">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;">
          <h2>💳 Pending Deposits</h2>
          <button class="btn btn-secondary btn-sm" onclick="loadDeposits()">🔄 Refresh</button>
        </div>
        <div id="depositsContent"><div class="text-center p-3" style="color:var(--text-muted);">Loading...</div></div>
      </div>

      <!-- Pending Withdrawals Tab -->
      <div class="tab-pane" id="tab-withdrawals">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;">
          <h2>💸 Pending Withdrawals</h2>
          <button class="btn btn-secondary btn-sm" onclick="loadWithdrawals()">🔄 Refresh</button>
        </div>
        <div id="withdrawalsContent"><div class="text-center p-3" style="color:var(--text-muted);">Loading...</div></div>
      </div>

      <!-- All Transactions Tab -->
      <div class="tab-pane" id="tab-transactions">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;">
          <h2>📋 All Transactions</h2>
          <button class="btn btn-secondary btn-sm" onclick="loadTransactions()">🔄 Refresh</button>
        </div>
        <div id="transactionsContent"><div class="text-center p-3" style="color:var(--text-muted);">Loading...</div></div>
      </div>

      <!-- Users Tab -->
      <div class="tab-pane" id="tab-users">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;">
          <h2>👥 All Users</h2>
          <button class="btn btn-secondary btn-sm" onclick="loadUsers()">🔄 Refresh</button>
        </div>
        <div id="usersContent"><div class="text-center p-3" style="color:var(--text-muted);">Loading...</div></div>
      </div>

    </div>
  </div>
</div>

<!-- Proof Image Modal -->
<div class="modal-overlay" id="proofModal">
  <div class="modal" style="max-width:700px;">
    <div class="modal-header">
      <span class="modal-title">Proof of Payment</span>
      <button class="modal-close" data-close-modal>✕</button>
    </div>
    <div class="modal-body" style="text-align:center;">
      <img id="proofImage" src="" alt="Proof" style="max-width:100%;max-height:70vh;border-radius:var(--radius-sm);" />
      <div id="proofPdf" style="display:none;padding:2rem;">
        <p style="color:var(--text-muted);">PDF proof attached. <a id="proofPdfLink" href="#" download>Download PDF</a></p>
      </div>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
