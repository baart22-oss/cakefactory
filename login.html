<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login / Register — CakeFactory</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; background: linear-gradient(135deg, var(--dark) 0%, #6b2d0a 100%); }
    .auth-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
    .auth-card { background: #fff; border-radius: var(--radius); box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 100%; max-width: 440px; overflow: hidden; }
    .auth-header { background: var(--dark); padding: 2rem; text-align: center; }
    .auth-header h1 { color: #fff; font-size: 1.5rem; margin-bottom: 0.25rem; }
    .auth-header p { color: rgba(255,255,255,0.7); font-size: 0.9rem; }
    .auth-body { padding: 2rem; }
    .auth-tabs { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 1.5rem; }
    .auth-tab { flex: 1; padding: 0.75rem; background: none; border: none; cursor: pointer; font-size: 0.95rem; font-weight: 600; color: var(--text-muted); border-bottom: 3px solid transparent; margin-bottom: -2px; transition: var(--transition); }
    .auth-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
    .back-home { text-align: center; padding: 1rem; color: rgba(255,255,255,0.75); font-size: 0.85rem; }
    .back-home a { color: var(--primary-light); }
  </style>
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div style="font-size:2.5rem;margin-bottom:0.5rem;">🎂</div>
      <h1>Cake<span style="color:var(--primary)">Factory</span></h1>
      <p>Build Cakes. Earn Returns.</p>
    </div>
    <div class="auth-body">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Login</button>
        <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</button>
      </div>

      <!-- Login Form -->
      <div id="form-login">
        <div id="login-error" class="alert alert-danger hidden"></div>
        <form id="loginForm" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-control" id="loginEmail" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <div class="input-icon-wrapper">
              <input type="password" class="form-control" id="loginPassword" placeholder="Your password" required />
              <span class="input-icon" onclick="togglePassword('loginPassword', this)">👁️</span>
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn">Login</button>
        </form>
        <p style="text-align:center;margin-top:1rem;font-size:0.85rem;color:var(--text-muted)">
          Don't have an account? <a href="#" onclick="switchTab('register')">Register here</a>
        </p>
      </div>

      <!-- Register Form -->
      <div id="form-register" style="display:none;">
        <div id="register-error" class="alert alert-danger hidden"></div>
        <form id="registerForm" onsubmit="handleRegister(event)">
          <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" id="regUsername" placeholder="Choose a username" minlength="3" maxlength="50" required />
          </div>
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-control" id="regEmail" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <div class="input-icon-wrapper">
              <input type="password" class="form-control" id="regPassword" placeholder="Min 6 characters" minlength="6" required />
              <span class="input-icon" onclick="togglePassword('regPassword', this)">👁️</span>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Referral Code <span style="color:var(--text-muted);font-weight:400">(optional)</span></label>
            <input type="text" class="form-control" id="regReferral" placeholder="e.g. CFABCD12" maxlength="20" />
            <div class="form-hint">Get 10% bonus on your friend's first deposit!</div>
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg" id="registerBtn">Create Account</button>
        </form>
        <p style="text-align:center;margin-top:1rem;font-size:0.85rem;color:var(--text-muted)">
          Already have an account? <a href="#" onclick="switchTab('login')">Login here</a>
        </p>
      </div>
    </div>
  </div>
</div>

<div class="back-home">
  <a href="index.html">← Back to Home</a>
</div>

<script src="js/app.js"></script>
<script src="js/login.js"></script>
</body>
</html>
